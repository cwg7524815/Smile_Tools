<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>微笑独立游戏开发工具包</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="app-shell toolkit-home">
      <header class="topbar">
        <div class="brand-title">
          <img class="brand-avatar" src="./头像.png" alt="">
          <div>
            <p class="eyebrow">微笑独立游戏开发</p>
            <h1>微笑独立游戏开发工具包</h1>
          </div>
        </div>
      </header>

      <section class="toolkit-panel">
        <div class="toolkit-table-header">
          <span>图标</span>
          <span>名字</span>
          <span>介绍</span>
          <span>版本</span>
          <span>最后更新时间</span>
        </div>

        <a class="tool-row" href="./video.html" target="_blank" rel="noopener">
          <span class="tool-icon">视</span>
          <strong>视频帧处理工具</strong>
          <span>本地视频按网格分割，抠背景后导出序列帧或合成图。</span>
          <span class="version-badge">V1.2.5</span>
          <time datetime="2026-06-09">2026-06-09</time>
        </a>

        <a class="tool-row" href="./matting.html" target="_blank" rel="noopener">
          <span class="tool-icon">图</span>
          <strong>图片抠图工具</strong>
          <span>全前端图片抠图，支持色键、去黑白底、预览缩放和区域保护。</span>
          <span class="version-badge">V1.1.2</span>
          <time datetime="2026-06-09">2026-06-09</time>
        </a>

        <a class="tool-row" href="./plugs/Smile_Sprite2D.rar" download>
          <span class="tool-icon">插</span>
          <strong>图层遮挡插件</strong>
          <span>Godot大地图遮挡插件</span>
          <span class="version-badge">V1.0</span>
          <time datetime="2026-06-10">2026-06-10</time>
        </a>
      </section>

      <footer class="toolkit-footer">
        <span>Copyright©️微笑独立游戏开发个人所有</span>
        <span>最后更新日期：2026-06-09</span>
      </footer>
    </main>

    <div id="entryModal" class="entry-modal" role="dialog" aria-modal="true" aria-labelledby="entryModalTitle">
      <div class="entry-modal-card">
        <h2 id="entryModalTitle">你被一阵敲锣声吸引住了</h2>
        <p>有钱的捧个钱场，没钱的捧个人场</p>
        <div class="entry-modal-actions">
          <button id="supportMoneyBtn" class="success" type="button">给主播充算力</button>
          <button id="supportApplauseBtn" class="ghost" type="button">给主播鼓掌</button>
        </div>
      </div>
    </div>

    <div id="qrModal" class="entry-modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="qrModalTitle">
      <div class="entry-modal-card qr-card">
        <h2 id="qrModalTitle">给主播充算力</h2>
        <img src="./support-qr.jpg" alt="微信支付二维码">
        <button id="closeQrBtn" class="ghost" type="button">关闭</button>
      </div>
    </div>

    <script>
      (() => {
        const entryModal = document.getElementById("entryModal");
        const qrModal = document.getElementById("qrModal");
        const enterHome = () => entryModal.classList.add("is-hidden");

        document.getElementById("supportApplauseBtn").addEventListener("click", () => {
          enterHome();
        });

        document.getElementById("supportMoneyBtn").addEventListener("click", () => {
          enterHome();
          qrModal.classList.remove("is-hidden");
        });

        document.getElementById("closeQrBtn").addEventListener("click", () => {
          qrModal.classList.add("is-hidden");
        });

      })();
    </script>
  </body>
</html>
