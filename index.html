<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频转序列帧表 - 纯前端版</title>
<style>
:root {
    --bg: #0d0d1a;
    --bg2: #131328;
    --card: #1a1a30;
    --card2: #1f1f38;
    --border: #2a2a4a;
    --border2: #3a3a5a;
    --accent: #7b61ff;
    --accent2: #9d8aff;
    --text: #e8e8f0;
    --text2: #8888aa;
    --text3: #555577;
    --success: #4ecdc4;
    --danger: #ff6b6b;
    --radius: 10px;
    --shadow: 0 6px 24px rgba(0,0,0,0.35);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
}

/* ===== Header ===== */
.header {
    text-align: center;
    padding: 30px 20px 20px;
}
.header .logo { font-size: 2.5rem; margin-bottom: 4px; }
.header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 2px; }
.header .sub { color: var(--text3); font-size: 0.82rem; margin-top: 4px; }

/* ===== Container ===== */
.container { max-width: 1100px; margin:0 auto; padding: 0 16px 40px; }

/* ===== Card ===== */
.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
}
.card-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 0.95rem;
    display: flex; align-items: center; gap: 8px;
}
.card-body { padding: 20px; }

/* ===== Steps ===== */
.steps {
    display: flex; justify-content: center; gap: 8px;
    margin-bottom: 28px; flex-wrap: wrap;
}
.step {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 0.82rem;
    color: var(--text2);
    transition: all 0.2s;
}
.step.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
}
.step.done {
    background: var(--success);
    border-color: var(--success);
    color: white;
}

/* ===== Upload Area ===== */
.upload-area {
    border: 2px dashed var(--border2);
    border-radius: var(--radius);
    padding: 50px 30px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
}
.upload-area:hover, .upload-area.dragover {
    border-color: var(--accent);
    background: rgba(123,97,255,0.05);
}
.upload-area .icon { font-size: 3rem; margin-bottom: 12px; }
.upload-area .title { font-size: 1.1rem; margin-bottom: 6px; }
.upload-area .sub { font-size: 0.82rem; color: var(--text2); }
.upload-area input { display: none; }

/* ===== Video Preview ===== */
.video-container {
    position: relative;
    background: var(--bg2);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
}
.video-container.show { display: block; }
.video-container video {
    width: 100%;
    max-height: 400px;
    display: block;
}
.video-controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 20px 16px 12px;
}
.video-controls .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    cursor: pointer;
    margin-bottom: 10px;
}
.video-controls .progress-bar .fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    width: 0%;
    transition: width 0.1s;
}
.video-controls .time {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.7);
}
.video-controls .btns {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 10px;
}
.video-controls .btn-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
}
.video-controls .btn-icon:hover { background: rgba(255,255,255,0.3); }

/* ===== Settings ===== */
.settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
}
.setting-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
}
.setting-item label {
    display: block;
    font-size: 0.78rem;
    color: var(--text2);
    margin-bottom: 6px;
}
.setting-item input, .setting-item select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 0.9rem;
}
.setting-item input:focus, .setting-item select:focus {
    outline: none;
    border-color: var(--accent);
}
.setting-item input[type="range"] {
    padding: 0;
    height: 6px;
    -webkit-appearance: none;
    background: var(--border);
    cursor: pointer;
}
.setting-item input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
}
.range-value {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--text2);
    margin-top: 4px;
}

/* ===== Button ===== */
.btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 12px 28px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 8px;
}
.btn:hover { background: var(--accent2); transform: translateY(-1px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secondary {
    background: var(--card2);
    border: 1px solid var(--border2);
}
.btn-secondary:hover { background: var(--border); }

/* ===== Timeline ===== */
.timeline-container {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
}
.timeline-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}
.timeline {
    position: relative;
    height: 60px;
    background: var(--card);
    border-radius: 6px;
    overflow: hidden;
}
.timeline-thumb {
    position: absolute;
    top: 0; bottom: 0;
    background: rgba(123,97,255,0.3);
    border-left: 2px solid var(--accent);
    cursor: ew-resize;
}
.timeline-thumb.start { border-left: none; border-right: 2px solid var(--accent); }
.timeline .playhead {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: var(--danger);
    pointer-events: none;
    z-index: 10;
}
.timeline .playhead::before {
    content: '';
    position: absolute;
    top: -4px;
    left: -4px;
    width: 10px; height: 10px;
    background: var(--danger);
    border-radius: 50%;
}

/* ===== Frame Preview ===== */
.frame-preview {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    text-align: center;
}
.frame-preview canvas {
    max-width: 100%;
    background: black;
    border-radius: 6px;
}
.frame-info {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 12px;
    font-size: 0.82rem;
    color: var(--text2);
}

/* ===== Output ===== */
.output-area {
    display: none;
}
.output-area.show { display: block; }
.output-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
    margin-bottom: 20px;
}
.output-frame {
    position: relative;
    aspect-ratio: 16/9;
    background: var(--bg2);
    border-radius: 6px;
    overflow: hidden;
}
.output-frame img {
    width: 100%; height: 100%;
    object-fit: contain;
    background: black;
}
.output-frame .frame-num {
    position: absolute;
    bottom: 4px; right: 4px;
    background: rgba(0,0,0,0.7);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.7rem;
}
.download-btns {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
}

/* ===== Progress ===== */
.progress-container {
    display: none;
    margin: 20px 0;
}
.progress-container.show { display: block; }
.progress-bar {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
}
.progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    transition: width 0.3s;
}
.progress-text {
    text-align: center;
    margin-top: 10px;
    font-size: 0.85rem;
    color: var(--text2);
}

/* ===== Log ===== */
.log-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 0.78rem;
    max-height: 200px;
    overflow-y: auto;
    display: none;
}
.log-box.show { display: block; }
.log-box .log-line { padding: 2px 0; }
.log-box .log-time { color: var(--text3); margin-right: 8px; }
.log-box .log-info { color: var(--success); }
.log-box .log-warn { color: #ffc107; }
.log-box .log-error { color: var(--danger); }

/* ===== Responsive ===== */
@media (max-width: 600px) {
    .settings-grid { grid-template-columns: 1fr; }
    .steps { gap: 4px; }
    .step { padding: 6px 12px; font-size: 0.75rem; }
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">🎬</div>
    <h1>视频转序列帧表</h1>
    <div class="sub">纯前端版 · 完全本地处理 · 无需上传</div>
</div>

<div class="container">
    <!-- Steps -->
    <div class="steps">
        <div class="step active" data-step="1">① 选视频</div>
        <div class="step" data-step="2">② 截片段</div>
        <div class="step" data-step="3">③ 设参数</div>
        <div class="step" data-step="4">④ 生成帧表</div>
        <div class="step" data-step="5">⑤ 下载结果</div>
    </div>

    <!-- Step 1: Upload -->
    <div class="card" id="card-upload">
        <div class="card-head">📁 选择本地视频文件</div>
        <div class="card-body">
            <div class="upload-area" id="uploadArea">
                <div class="icon">📂</div>
                <div class="title">点击选择视频文件 或 拖拽到此处</div>
                <div class="sub">支持 MP4, AVI, MOV, MKV, WEBM 等格式</div>
                <input type="file" id="fileInput" accept="video/*">
            </div>
            <div class="video-container" id="videoContainer">
                <video id="video" preload="metadata"></video>
                <div class="video-controls">
                    <div class="progress-bar" id="videoProgressBar">
                        <div class="fill" id="videoProgressFill"></div>
                    </div>
                    <div class="time">
                        <span id="currentTime">00:00.000</span>
                        <span id="duration">00:00.000</span>
                    </div>
                    <div class="btns">
                        <button class="btn-icon" id="btnPlayPause" title="播放/暂停">▶</button>
                        <button class="btn-icon" id="btnStepBack" title="后退1秒">⏪</button>
                        <button class="btn-icon" id="btnStepForward" title="前进1秒">⏩</button>
                        <button class="btn-icon" id="btnChangeVideo" title="更换视频">🔄</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Step 2: Timeline -->
    <div class="card" id="card-timeline">
        <div class="card-head">✂️ 选取片段（可选）</div>
        <div class="card-body">
            <div class="timeline-container">
                <div class="timeline-header">
                    <span>拖动左右滑块选择处理范围</span>
                    <span id="selectionInfo">全片</span>
                </div>
                <div class="timeline" id="timeline">
                    <div class="timeline-thumb start" id="thumbStart"></div>
                    <div class="timeline-thumb end" id="thumbEnd"></div>
                    <div class="playhead" id="playhead"></div>
                </div>
            </div>
            <div class="frame-preview">
                <canvas id="previewCanvas"></canvas>
                <div class="frame-info">
                    <span>当前帧: <strong id="frameNum">0</strong></span>
                    <span>时间: <strong id="frameTime">00:00.000</strong></span>
                </div>
            </div>
            <div style="text-align: center;">
                <button class="btn" id="btnNextStep2">下一步：设置参数 →</button>
            </div>
        </div>
    </div>

    <!-- Step 3: Settings -->
    <div class="card" id="card-settings">
        <div class="card-head">⚙️ 抽帧参数</div>
        <div class="card-body">
            <div class="settings-grid">
                <div class="setting-item">
                    <label>每 N 帧抽 1 帧</label>
                    <input type="range" id="frameInterval" min="1" max="30" value="5">
                    <div class="range-value">
                        <span>每帧</span>
                        <span id="frameIntervalVal">5帧</span>
                    </div>
                </div>
                <div class="setting-item">
                    <label>每行帧数</label>
                    <input type="range" id="framesPerRow" min="2" max="12" value="6">
                    <div class="range-value">
                        <span>2</span>
                        <span id="framesPerRowVal">6</span>
                    </div>
                </div>
                <div class="setting-item">
                    <label>缩放比例</label>
                    <input type="range" id="scale" min="25" max="100" value="50">
                    <div class="range-value">
                        <span>25%</span>
                        <span id="scaleVal">50%</span>
                    </div>
                </div>
                <div class="setting-item">
                    <label>图像质量</label>
                    <select id="quality">
                        <option value="0.3">低（体积小）</option>
                        <option value="0.6" selected>中（推荐）</option>
                        <option value="0.85">高（清晰）</option>
                        <option value="1.0">最高</option>
                    </select>
                </div>
            </div>
            <div style="margin-top: 20px; text-align: center;">
                <button class="btn" id="btnGenerate">🎬 开始生成帧表</button>
            </div>
        </div>
    </div>

    <!-- Progress -->
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar">
            <div class="fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">准备中...</div>
    </div>

    <!-- Log -->
    <div class="log-box" id="logBox"></div>

    <!-- Step 4-5: Output -->
    <div class="card output-area" id="card-output">
        <div class="card-head">📊 生成结果</div>
        <div class="card-body">
            <div class="output-grid" id="outputGrid"></div>
            <div class="download-btns">
                <button class="btn" id="btnDownloadImage">📷 下载帧表图片</button>
                <button class="btn btn-secondary" id="btnDownloadZip">📦 下载所有帧 (ZIP)</button>
                <button class="btn btn-secondary" id="btnReset">🔄 处理新视频</button>
            </div>
        </div>
    </div>
</div>

<script>
// ============ State ============
const state = {
    video: null,
    videoFile: null,
    duration: 0,
    startTime: 0,
    endTime: 0,
    currentTime: 0,
    isPlaying: false,
    frames: [],
    settings: {
        frameInterval: 5,
        framesPerRow: 6,
        scale: 0.5,
        quality: 0.6
    }
};

// ============ Elements ============
const els = {
    uploadArea: document.getElementById('uploadArea'),
    fileInput: document.getElementById('fileInput'),
    videoContainer: document.getElementById('videoContainer'),
    video: document.getElementById('video'),
    videoProgressBar: document.getElementById('videoProgressBar'),
    videoProgressFill: document.getElementById('videoProgressFill'),
    currentTime: document.getElementById('currentTime'),
    duration: document.getElementById('duration'),
    btnPlayPause: document.getElementById('btnPlayPause'),
    btnStepBack: document.getElementById('btnStepBack'),
    btnStepForward: document.getElementById('btnStepForward'),
    btnChangeVideo: document.getElementById('btnChangeVideo'),
    timeline: document.getElementById('timeline'),
    thumbStart: document.getElementById('thumbStart'),
    thumbEnd: document.getElementById('thumbEnd'),
    playhead: document.getElementById('playhead'),
    selectionInfo: document.getElementById('selectionInfo'),
    previewCanvas: document.getElementById('previewCanvas'),
    frameNum: document.getElementById('frameNum'),
    frameTime: document.getElementById('frameTime'),
    btnNextStep2: document.getElementById('btnNextStep2'),
    frameInterval: document.getElementById('frameInterval'),
    frameIntervalVal: document.getElementById('frameIntervalVal'),
    framesPerRow: document.getElementById('framesPerRow'),
    framesPerRowVal: document.getElementById('framesPerRowVal'),
    scale: document.getElementById('scale'),
    scaleVal: document.getElementById('scaleVal'),
    quality: document.getElementById('quality'),
    btnGenerate: document.getElementById('btnGenerate'),
    progressContainer: document.getElementById('progressContainer'),
    progressFill: document.getElementById('progressFill'),
    progressText: document.getElementById('progressText'),
    logBox: document.getElementById('logBox'),
    outputArea: document.getElementById('output-area'),
    cardOutput: document.getElementById('card-output'),
    outputGrid: document.getElementById('outputGrid'),
    btnDownloadImage: document.getElementById('btnDownloadImage'),
    btnDownloadZip: document.getElementById('btnDownloadZip'),
    btnReset: document.getElementById('btnReset'),
    steps: document.querySelectorAll('.step')
};

// ============ Utils ============
function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    const ms = Math.floor((seconds % 1) * 1000);
    return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}.${String(ms).padStart(3, '0')}`;
}

function log(msg, type = 'info') {
    const box = els.logBox;
    box.classList.add('show');
    const line = document.createElement('div');
    line.className = `log-line log-${type}`;
    line.innerHTML = `<span class="log-time">[${new Date().toLocaleTimeString()}]</span>${msg}`;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
}

function updateSteps(step) {
    els.steps.forEach((s, i) => {
        s.classList.remove('active', 'done');
        if (i + 1 < step) s.classList.add('done');
        else if (i + 1 === step) s.classList.add('active');
    });
}

function setStepVisible(cardId, visible) {
    const card = document.getElementById(cardId);
    if (card) card.style.display = visible ? 'block' : 'none';
}

// ============ File Handling ============
els.uploadArea.addEventListener('click', () => els.fileInput.click());

els.uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    els.uploadArea.classList.add('dragover');
});

els.uploadArea.addEventListener('dragleave', () => {
    els.uploadArea.classList.remove('dragover');
});

els.uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    els.uploadArea.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('video/')) {
        loadVideo(file);
    }
});

els.fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) loadVideo(file);
});

function loadVideo(file) {
    state.videoFile = file;
    const url = URL.createObjectURL(file);
    els.video.src = url;
    els.uploadArea.style.display = 'none';
    els.videoContainer.classList.add('show');
    log(`已加载视频: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`, 'info');
}

els.video.addEventListener('loadedmetadata', () => {
    state.duration = els.video.duration;
    state.endTime = state.duration;
    state.startTime = 0;
    els.duration.textContent = formatTime(state.duration);
    updateTimeline();
    updateSelectionInfo();
    drawPreviewFrame();
    updateSteps(2);
    log(`视频信息: ${state.duration.toFixed(2)}秒`, 'info');
});

els.video.addEventListener('timeupdate', () => {
    state.currentTime = els.video.currentTime;
    els.currentTime.textContent = formatTime(state.currentTime);
    const percent = (state.currentTime / state.duration) * 100;
    els.videoProgressFill.style.width = percent + '%';
    els.playhead.style.left = percent + '%';
    
    if (Math.abs(state.currentTime - state.startTime) < 0.5) {
        els.frameNum.textContent = '0';
        els.frameTime.textContent = formatTime(state.startTime);
    }
});

els.video.addEventListener('play', () => {
    state.isPlaying = true;
    els.btnPlayPause.textContent = '⏸';
});

els.video.addEventListener('pause', () => {
    state.isPlaying = false;
    els.btnPlayPause.textContent = '▶';
});

els.btnPlayPause.addEventListener('click', () => {
    if (state.isPlaying) {
        els.video.pause();
    } else {
        els.video.play();
    }
});

els.btnStepBack.addEventListener('click', () => {
    els.video.currentTime = Math.max(0, els.video.currentTime - 1);
});

els.btnStepForward.addEventListener('click', () => {
    els.video.currentTime = Math.min(state.duration, els.video.currentTime + 1);
});

els.btnChangeVideo.addEventListener('click', () => {
    els.fileInput.click();
});

els.videoProgressBar.addEventListener('click', (e) => {
    const rect = els.videoProgressBar.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    els.video.currentTime = percent * state.duration;
});

// ============ Timeline ============
let dragging = null;

function updateTimeline() {
    const startPercent = (state.startTime / state.duration) * 100;
    const endPercent = (state.endTime / state.duration) * 100;
    els.thumbStart.style.left = startPercent + '%';
    els.thumbEnd.style.left = endPercent + '%';
    els.thumbStart.style.width = (endPercent - startPercent) + '%';
}

function updateSelectionInfo() {
    const dur = state.endTime - state.startTime;
    els.selectionInfo.textContent = 
        `${formatTime(state.startTime)} ~ ${formatTime(state.endTime)} (${dur.toFixed(1)}秒)`;
}

function getTimeFromX(e) {
    const rect = els.timeline.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const percent = Math.max(0, Math.min(1, x / rect.width));
    return percent * state.duration;
}

els.thumbStart.addEventListener('mousedown', (e) => {
    e.preventDefault();
    dragging = 'start';
});

els.thumbEnd.addEventListener('mousedown', (e) => {
    e.preventDefault();
    dragging = 'end';
});

document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const time = getTimeFromX(e);
    
    if (dragging === 'start') {
        state.startTime = Math.min(time, state.endTime - 0.1);
    } else {
        state.endTime = Math.max(time, state.startTime + 0.1);
    }
    
    updateTimeline();
    updateSelectionInfo();
});

document.addEventListener('mouseup', () => {
    dragging = null;
});

els.timeline.addEventListener('click', (e) => {
    if (e.target === els.thumbStart || e.target === els.thumbEnd) return;
    const time = getTimeFromX(e);
    els.video.currentTime = Math.max(state.startTime, Math.min(state.endTime, time));
    drawPreviewFrame();
});

// ============ Preview ============
function drawPreviewFrame() {
    const canvas = els.previewCanvas;
    const video = els.video;
    const ctx = canvas.getContext('2d');
    
    // Set canvas size to match video
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 360;
    
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // Update frame info
    els.frameTime.textContent = formatTime(els.video.currentTime);
}

// Update preview periodically when playing
els.video.addEventListener('timeupdate', drawPreviewFrame);

// ============ Step Navigation ============
els.btnNextStep2.addEventListener('click', () => {
    updateSteps(3);
    setStepVisible('card-upload', false);
    setStepVisible('card-timeline', false);
    setStepVisible('card-settings', true);
});

// ============ Settings ============
els.frameInterval.addEventListener('input', (e) => {
    state.settings.frameInterval = parseInt(e.target.value);
    els.frameIntervalVal.textContent = e.target.value + '帧';
});

els.framesPerRow.addEventListener('input', (e) => {
    state.settings.framesPerRow = parseInt(e.target.value);
    els.framesPerRowVal.textContent = e.target.value;
});

els.scale.addEventListener('input', (e) => {
    state.settings.scale = parseInt(e.target.value) / 100;
    els.scaleVal.textContent = e.target.value + '%';
});

els.quality.addEventListener('change', (e) => {
    state.settings.quality = parseFloat(e.target.value);
});

// ============ Frame Extraction ============
els.btnGenerate.addEventListener('click', generateFrames);

async function generateFrames() {
    updateSteps(4);
    setStepVisible('card-settings', false);
    els.progressContainer.classList.add('show');
    els.logBox.classList.add('show');
    
    const video = els.video;
    const { frameInterval, framesPerRow, scale, quality } = state.settings;
    
    // Calculate frames to extract
    const fps = 30; // Assume 30fps for calculation
    const startFrame = Math.floor(state.startTime * fps);
    const endFrame = Math.floor(state.endTime * fps);
    const totalFrames = endFrame - startFrame;
    
    const framesToExtract = [];
    for (let i = startFrame; i < endFrame; i += frameInterval) {
        framesToExtract.push(i / fps);
    }
    
    log(`需要提取 ${framesToExtract.length} 帧`, 'info');
    
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    const outputWidth = Math.floor((video.videoWidth || 640) * scale);
    const outputHeight = Math.floor((video.videoHeight || 360) * scale);
    canvas.width = outputWidth;
    canvas.height = outputHeight;
    
    state.frames = [];
    
    // Extract each frame
    for (let i = 0; i < framesToExtract.length; i++) {
        const time = framesToExtract[i];
        
        // Update progress
        const percent = ((i + 1) / framesToExtract.length) * 80;
        els.progressFill.style.width = percent + '%';
        els.progressText.textContent = `提取帧 ${i + 1}/${framesToExtract.length}...`;
        
        // Seek to time and wait for frame
        await new Promise((resolve) => {
            const handler = () => {
                video.removeEventListener('seeked', handler);
                resolve();
            };
            video.addEventListener('seeked', handler);
            video.currentTime = time;
        });
        
        // Draw frame to canvas
        ctx.drawImage(video, 0, 0, outputWidth, outputHeight);
        
        // Get image data
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        state.frames.push({
            dataUrl,
            time,
            index: i
        });
        
        log(`提取帧 ${i + 1}: ${formatTime(time)}`, 'info');
    }
    
    log('正在生成帧表...', 'info');
    els.progressFill.style.width = '90%';
    els.progressText.textContent = '生成帧表图片...';
    
    // Generate sprite sheet
    await generateSpriteSheet(framesToExtract.length, outputWidth, outputHeight, framesPerRow, scale, quality);
    
    // Show output
    els.progressFill.style.width = '100%';
    els.progressText.textContent = '完成!';
    updateSteps(5);
    els.cardOutput.classList.add('show');
    els.progressContainer.classList.remove('show');
    
    log('生成完成!', 'info');
}

async function generateSpriteSheet(frameCount, frameWidth, frameHeight, framesPerRow, scale, quality) {
    const rows = Math.ceil(frameCount / framesPerRow);
    const cols = Math.min(frameCount, framesPerRow);
    
    const sheetCanvas = document.createElement('canvas');
    sheetCanvas.width = cols * frameWidth;
    sheetCanvas.height = rows * frameHeight;
    const ctx = sheetCanvas.getContext('2d');
    
    // Fill with black background
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, sheetCanvas.width, sheetCanvas.height);
    
    // Draw frames
    els.outputGrid.innerHTML = '';
    
    for (let i = 0; i < state.frames.length; i++) {
        const frame = state.frames[i];
        
        // Load image
        const img = await loadImage(frame.dataUrl);
        
        // Calculate position
        const col = i % framesPerRow;
        const row = Math.floor(i / framesPerRow);
        const x = col * frameWidth;
        const y = row * frameHeight;
        
        // Draw to sprite sheet
        ctx.drawImage(img, x, y, frameWidth, frameHeight);
        
        // Add to grid preview
        const div = document.createElement('div');
        div.className = 'output-frame';
        
        const imgEl = document.createElement('img');
        imgEl.src = frame.dataUrl;
        imgEl.alt = `帧 ${i + 1}`;
        
        const num = document.createElement('div');
        num.className = 'frame-num';
        num.textContent = `#${i + 1}`;
        
        div.appendChild(imgEl);
        div.appendChild(num);
        els.outputGrid.appendChild(div);
        
        // Small delay for UI responsiveness
        if (i % 10 === 0) {
            await new Promise(r => setTimeout(r, 10));
        }
    }
    
    // Store sprite sheet for download
    state.spriteSheet = sheetCanvas.toDataURL('image/png');
}

function loadImage(src) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
    });
}

// ============ Download ============
els.btnDownloadImage.addEventListener('click', () => {
    if (state.spriteSheet) {
        const link = document.createElement('a');
        link.download = `frames_${Date.now()}.png`;
        link.href = state.spriteSheet;
        link.click();
        log('帧表图片已下载', 'info');
    }
});

els.btnDownloadZip.addEventListener('click', async () => {
    if (state.frames.length === 0) return;
    
    els.progressContainer.classList.add('show');
    els.progressFill.style.width = '0%';
    els.progressText.textContent = '准备打包...';
    
    // Create zip using JSZip-like implementation (simple version)
    // Since we can't use external libraries, we'll download frames individually
    log('开始下载所有帧...', 'info');
    
    for (let i = 0; i < state.frames.length; i++) {
        const frame = state.frames[i];
        const link = document.createElement('a');
        link.download = `frame_${String(i + 1).padStart(4, '0')}.jpg`;
        link.href = frame.dataUrl;
        link.click();
        
        els.progressFill.style.width = ((i + 1) / state.frames.length * 100) + '%';
        els.progressText.textContent = `下载帧 ${i + 1}/${state.frames.length}...`;
        
        await new Promise(r => setTimeout(r, 50));
    }
    
    els.progressContainer.classList.remove('show');
    log('所有帧下载完成!', 'info');
});

els.btnReset.addEventListener('click', () => {
    location.reload();
});

// ============ Initialize ============
updateSteps(1);
log('视频转序列帧表工具已就绪', 'info');
</script>
